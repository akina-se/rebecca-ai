name: "🚀 機能要望 (Feature Request)"
description: Rebecca AIに対する新しいアイデアや機能の提案
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Rebecca AIへの機能提案ありがとうございます！
        アイデアの意図が伝わりやすくなるよう、できるだけ詳細に記載してください。
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題 (Problem)
      description: この機能要望の背景にある「現在困っていること」や「課題」を教えてください。
      placeholder: 例: 現在の仕様だと〇〇の操作が不便で、時間がかかってしまう。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 望ましい解決策 (Solution)
      description: どのような機能が追加・変更されると嬉しいか、具体的なアイデアを記載してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案 (Alternatives)
      description: 他の解決策やワークアラウンド（一時的な回避策）を試していれば記載してください。
  - type: textarea
    id: additional_context
    attributes:
      label: その他のコンテキスト (Additional context)
      description: その他、関連する参考リンクなどがあれば記載してください。
